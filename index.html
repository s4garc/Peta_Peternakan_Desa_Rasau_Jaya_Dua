<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <style>
        html, body {
            background-color: #ffffff;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444444!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #444444!important;
        }
        .search-layer-input-search {
            background-color: #f8f8f8!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(248, 248, 248, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        } 
        </style>

        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title>KilaV2 (QFieldCloud)</title>
    
<style>
#loading-screen{position:fixed;inset:0;background:#24402f;z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;font-family:Arial}
#loading-screen .spinner{width:42px;height:42px;border:4px solid rgba(255,255,255,.2);border-top:4px solid #c9a66b;border-radius:50%;animation:spin 1s linear infinite}
#loading-screen .badge{margin-top:15px;font-weight:bold}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-screen.hide{opacity:0;transition:.4s;pointer-events:none}
</style>

<style>
#peta-header{position:fixed;left:12px;bottom:36px;z-index:1500;background:#f7f3ea;border-left:5px solid #a85c32;border-radius:12px;padding:14px 18px 14px 14px;box-shadow:0 4px 16px rgba(0,0,0,.25);max-width:360px;font-family:Arial}
#peta-header .icon{font-size:34px;line-height:1;color:#24402f}
#peta-header .title{font-size:22px;font-weight:700;color:#24402f;margin:0}
#peta-header .sub{font-size:14px;color:#4b675a;line-height:1.35;margin:4px 0 8px}
#peta-header .badge{display:inline-block;background:#3c6350;color:#fff;padding:5px 12px;border-radius:999px;font-size:13px;font-weight:700}
@media(max-width:600px){#peta-header{max-width:90%;}.title{font-size:18px}}
</style>
</head>
    <body>
<div id="loading-screen"><div class="spinner"></div><div style="margin-top:10px">Memuat peta...</div><div class="badge">KKN PPM UGM · Rasau Kembara</div></div>
        
<div id="peta-header">
<div><p class="title">Peta Peternakan</p>
<div class="sub">Desa Rasau Jaya Dua, Kubu Raya, Kalimantan Barat</div>
<span class="badge">KKN PPM UGM · Rasau Kembara</span>
</div></div>
<div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>
        <script src="resources/qgis2web_expressions.js"></script>
<script src="resources/proj4.js"></script>
        <script>proj4.defs('EPSG:32749','+proj=utm +zone=49 +south +datum=WGS84 +units=m +no_defs');</script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="resources/olms.js"></script>
        <script src="layers/NamaDusun_1.js"></script><script src="layers/Jalan_2.js"></script><script src="layers/BatasDusun_3.js"></script><script src="layers/BatasDesa_4.js"></script><script src="layers/Peternakan_5.js"></script>
        <script src="styles/NamaDusun_1_style.js"></script><script src="styles/Jalan_2_style.js"></script><script src="styles/BatasDusun_3_style.js"></script><script src="styles/BatasDesa_4_style.js"></script><script src="styles/Peternakan_5_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>        
    <script>(function(){function h(){var e=document.getElementById('loading-screen');e.classList.add('hide');setTimeout(()=>e.remove(),400)}function w(){if(typeof map!='undefined'&&map.once){map.once('rendercomplete',h)}else setTimeout(w,100)}w();setTimeout(h,4000);})();</script></body>
</html>
